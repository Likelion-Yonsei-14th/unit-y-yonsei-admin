# GitHub Actions 의존성을 SHA 로 핀해두고, Dependabot 이 자동 PR 로 회전시킨다.
# 도입 배경: third-party 액션(pnpm/action-setup) 태그 재이동을 통한 supply-chain
# 공격 차단. 첫 SHA 핀 시점은 2026-05-08, CSO 감사 권고 반영.
version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    # PR 본문에 SHA → version 매핑 보이도록 commit-message prefix 추가.
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'github-actions'
