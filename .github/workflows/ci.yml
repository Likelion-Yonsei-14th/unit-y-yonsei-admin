name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

# 동일 브랜치/PR 의 이전 실행은 새 push 가 들어오면 자동 취소.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · format · build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # 액션은 SHA 로 핀해 supply-chain 위험(태그 재이동) 차단. Dependabot 이
      # 자동 PR 로 SHA 를 회전시킨다(.github/dependabot.yml 참고).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          run_install: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
